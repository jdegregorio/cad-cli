name: release-please

# Automated versioning + GitHub Releases for cad-cli.
#
# How it works:
#   1. Every push to `main` runs `release-please`, which inspects commit
#      messages since the last release and maintains an open "release PR"
#      that bumps the version in pyproject.toml and updates CHANGELOG.md.
#   2. When you merge that release PR, release-please creates a GitHub
#      Release (and the matching `vX.Y.Z` tag).
#   3. The `build` job below fires on that release, builds an sdist + wheel
#      with `uv build`, validates their metadata, and attaches them to the
#      GitHub Release as downloadable assets.
#
# Commit messages must follow Conventional Commits so version bumps are
# deterministic:
#   feat: …          -> minor bump   (or patch while < 1.0, per config)
#   fix: …           -> patch bump
#   feat!: … / BREAKING CHANGE footer -> major bump
#   docs:, chore:, ci:, test:, refactor:, perf:, build:, revert:

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create / update release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build and attach release assets
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Validate package metadata
        run: uvx --from twine twine check dist/*

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ needs.release-please.outputs.tag_name }}" \
            dist/*.whl dist/*.tar.gz \
            --clobber
